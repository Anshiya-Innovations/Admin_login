<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-primary: #1a56db; --color-primary-hover: #1648c0; --color-primary-active: #1240aa;
      --color-bg: #e8edf5; --color-card-bg: #ffffff; --color-card-shadow: rgba(0,0,0,0.10);
      --color-text-heading: #111827; --color-text-subtitle: #6b7280; --color-text-label: #374151;
      --color-text-placeholder: #9ca3af; --color-text-icon: #374151;
      --color-input-border: #d1d5db; --color-input-border-focus: #1a56db; --color-input-bg: #ffffff;
      --color-tab-bg: #f0f2f5; --color-tab-active-bg: #ffffff; --color-tab-active-shadow: rgba(0,0,0,0.10);
      --color-tab-text: #6b7280; --color-tab-active-text: #111827;
      --color-error: #dc2626; --color-rule-pending: #9ca3af; --color-rule-valid: #16a34a; --color-rule-invalid: #dc2626;
      --radius-card: 24px; --radius-input: 12px; --radius-btn: 12px; --radius-tab: 10px;
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    html, body { min-height: 100%; font-family: var(--font-family); -webkit-font-smoothing: antialiased; }
    body { background-color: var(--color-bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px 16px; }
    .page-bg { display: flex; align-items: center; justify-content: center; width: 100%; min-height: 100%; }
    .card { background: var(--color-card-bg); border-radius: var(--radius-card); box-shadow: 0 4px 32px var(--color-card-shadow); padding: 40px 36px; width: 100%; max-width: 420px; }
    .card-header { text-align: center; margin-bottom: 28px; }
    .card-title { font-size: 2rem; font-weight: 800; color: var(--color-text-heading); letter-spacing: -0.5px; line-height: 1.15; margin-bottom: 8px; }
    .card-subtitle { font-size: 0.9375rem; color: var(--color-text-subtitle); line-height: 1.5; }

    .auth-form { display: flex; flex-direction: column; }
    .input-group { display: flex; align-items: center; background: var(--color-input-bg); border: 1.5px solid var(--color-input-border); border-radius: var(--radius-input); padding: 12px 14px; gap: 12px; transition: border-color 0.15s ease, box-shadow 0.15s ease; margin-bottom: 6px; }
    .input-group:focus-within { border-color: var(--color-input-border-focus); box-shadow: 0 0 0 3px rgba(26,86,219,0.10); }
    .input-group.has-error { border-color: var(--color-error); box-shadow: none; }
    .input-group.has-error:focus-within { box-shadow: 0 0 0 3px rgba(220,38,38,0.10); }
    .input-icon { display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--color-text-icon); width: 22px; }
    .input-content { display: flex; flex-direction: column; flex: 1; min-width: 0; }
    .input-label { font-size: 0.75rem; font-weight: 600; color: var(--color-text-label); margin-bottom: 2px; line-height: 1.3; cursor: default; }
    .input-field { border: none; outline: none; background: transparent; font-size: 0.9375rem; color: #374151; font-family: var(--font-family); width: 100%; padding: 0; line-height: 1.4; }
    .input-field::placeholder { color: var(--color-text-placeholder); }
    .toggle-pw { display: flex; align-items: center; justify-content: center; background: none; border: none; cursor: pointer; color: #9ca3af; padding: 2px; flex-shrink: 0; transition: color 0.15s ease; outline: none; }
    .toggle-pw:hover { color: var(--color-primary); }
    .eye-icon { display: block; }
    .hidden { display: none; }
    .field-error { font-size: 0.8125rem; color: var(--color-error); margin-bottom: 10px; padding-left: 2px; line-height: 1.4; min-height: 1.2em; }
    .field-error:empty { min-height: 0; margin-bottom: 0; }
    .btn-primary { width: 100%; padding: 15px; background: var(--color-primary); color: #ffffff; border: none; border-radius: var(--radius-btn); font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease; outline: none; letter-spacing: 0.01em; margin-top: 8px; box-shadow: 0 2px 12px rgba(26,86,219,0.25); font-family: var(--font-family); }
    .btn-primary:hover { background: var(--color-primary-hover); box-shadow: 0 4px 18px rgba(26,86,219,0.35); }
    .btn-primary:active { background: var(--color-primary-active); transform: translateY(1px); box-shadow: 0 2px 8px rgba(26,86,219,0.20); }
    @media (max-width: 480px) { .card { padding: 32px 20px; border-radius: 20px; } .card-title { font-size: 1.75rem; } }
    @media (max-width: 360px) { .card { padding: 24px 16px; } .card-title { font-size: 1.5rem; } .input-group { padding: 10px 12px; } }
  </style>
</head>
<body>
  <div class="page-bg">
    <div class="card">
      <div class="card-header">
        <h1 class="card-title">Welcome Back</h1>
        <p class="card-subtitle">Welcome Back, Please enter Your details</p>
      </div>



      <form class="auth-form" id="login-form" novalidate>
        <div class="input-group">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="7" width="20" height="14" rx="2"/>
              <path d="M16 3H8a2 2 0 0 0-2 2v2h12V5a2 2 0 0 0-2-2z"/>
              <line x1="12" y1="12" x2="12" y2="16"/>
              <line x1="10" y1="14" x2="14" y2="14"/>
            </svg>
          </span>
          <div class="input-content">
            <label class="input-label" for="login-empid">Employee ID</label>
            <input class="input-field" type="text" id="login-empid" name="empid" placeholder="EMP001" autocomplete="username" />
          </div>
        </div>
        <div class="field-error" id="login-empid-error"></div>

        <div class="input-group">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <div class="input-content">
            <label class="input-label" for="login-password">Password</label>
            <input class="input-field" type="password" id="login-password" name="password" placeholder="••••••••" autocomplete="current-password" />
          </div>
          <button type="button" class="toggle-pw" id="login-pw-toggle" aria-label="Toggle password visibility">
            <svg class="eye-icon eye-open" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="eye-icon eye-closed hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <div class="field-error" id="login-password-error"></div>

        <button type="submit" class="btn-primary">Continue</button>
      </form>
    </div>
  </div>

  <script>
    function isValidEmpId(v) { return /^EMP\d{3,}$/i.test(v.trim()) || v.trim().toUpperCase() === 'ADMIN001'; }
    function showError(el, grp, msg) { el.textContent = msg; if(grp) grp.classList.add('has-error'); }
    function clearError(el, grp) { el.textContent = ''; if(grp) grp.classList.remove('has-error'); }

    // Password toggle
    (function() {
      var input = document.getElementById('login-password');
      var toggle = document.getElementById('login-pw-toggle');
      toggle.addEventListener('click', function() {
        var isPw = input.type === 'password';
        input.type = isPw ? 'text' : 'password';
        toggle.querySelector('.eye-open').classList.toggle('hidden', isPw);
        toggle.querySelector('.eye-closed').classList.toggle('hidden', !isPw);
      });
    })();

    var empidInput   = document.getElementById('login-empid');
    var pwInput      = document.getElementById('login-password');
    var empidError   = document.getElementById('login-empid-error');
    var pwError      = document.getElementById('login-password-error');
    var empidGroup   = empidInput.closest('.input-group');
    var pwGroup      = pwInput.closest('.input-group');

    empidInput.addEventListener('input', function() {
      if (empidInput.value && !isValidEmpId(empidInput.value))
        showError(empidError, empidGroup, 'Employee ID must be in format EMP001 or ADMIN001.');
      else clearError(empidError, empidGroup);
    });

    pwInput.addEventListener('input', function() {
      if (pwInput.value) clearError(pwError, pwGroup);
    });

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var valid = true;
      var empid = empidInput.value.trim().toUpperCase();
      var pw    = pwInput.value;

      if (!empid) { showError(empidError, empidGroup, 'Employee ID is required.'); valid = false; }
      else if (!isValidEmpId(empid)) { showError(empidError, empidGroup, 'Employee ID must be in format EMP001 or ADMIN001.'); valid = false; }
      else clearError(empidError, empidGroup);

      if (!pw) { showError(pwError, pwGroup, 'Password is required.'); valid = false; }
      else clearError(pwError, pwGroup);

      if (valid) {
        fetch('/api/admin/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ empid: empid, password: pw })
        })
        .then(function(res) {
          return res.json().then(function(data) {
            if (!res.ok) {
              throw new Error(data.error || 'Admin login failed.');
            }
            return data;
          });
        })
        .then(function(data) {
          window.location.href = 'final_tool_page.html';
        })
        .catch(function(err) {
          alert(err.message);
        });
      }
    });
  </script>
</body>
</html>
